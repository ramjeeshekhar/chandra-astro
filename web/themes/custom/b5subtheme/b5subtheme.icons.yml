# b5subtheme.icons.yml

bootstrap: # The icon pack ID must be lowercase with underscores (e.g., 'bootstrap_icons' or 'bootstrap')
  label: 'Bootstrap Icons'
  extractor: svg
  config:
    sources:
      # Path assumes the icons are in /themes/custom/b5subtheme/assets/bootstrap-icons/icons/
      - 'assets/bootstrap-icons/icons/*.svg' 
    
  # ----------------------------------------------------
  # UI Icons / Core Icon API Settings (Optional but Recommended)
  # ----------------------------------------------------
  settings:
    size:
      title: "Size"
      description: "Set a size for this icon."
      type: "integer"
      default: 20
    class:
      title: "Class"
      description: "Set a class for this icon."
      type: "string"
      default: ""
  # ----------------------------------------------------
  # Required Template for 'svg' Extractor
  # ----------------------------------------------------
  template: >
    <svg
      {{ attributes
          .setAttribute('viewBox', attributes.viewBox|default('0 0 24 24'))
          .setAttribute('class', class)
          .setAttribute('width', size|default('20'))
          .setAttribute('height', size|default('20'))
          .setAttribute('aria-hidden', 'true')
      }}
    >
      {{ content }}
    </svg>
